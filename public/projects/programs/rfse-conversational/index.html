<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFSE Conversational - A Novel Approach to Dialogue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        .conversation-area {
            height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.system {
            background: #e3f2fd;
            color: #1565c0;
            margin-right: auto;
        }

        .message.rfse {
            background: #f3e5f5;
            color: #6a1b9a;
            margin-right: auto;
        }

        .message-meta {
            font-size: 0.75em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #sendButton:active {
            transform: translateY(0);
        }

        #sendButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .stats-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .stats-panel h3 {
            margin-bottom: 10px;
            color: #764ba2;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .stat-item {
            padding: 10px;
            background: white;
            border-radius: 5px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #667eea;
            color: white;
        }

        .feedback-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .feedback-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .feedback-btn:hover {
            transform: scale(1.05);
        }

        .feedback-btn.positive {
            background: #4caf50;
            color: white;
        }

        .feedback-btn.negative {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RFSE Conversational</h1>
            <p>A novel AI model based on algebraic fixpoint synthesis</p>
        </div>

        <div class="content">
            <div class="conversation-area" id="conversationArea">
                <div class="message system">
                    <div><strong>System:</strong> RFSE initialized. The system learns through interaction and feedback.</div>
                    <div class="message-meta">All components operational</div>
                </div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Type your message here..."
                    autocomplete="off"
                >
                <button id="sendButton">Send</button>
            </div>

            <div class="feedback-btns">
                <button class="feedback-btn positive" id="positiveFeedback">👍 Good Response</button>
                <button class="feedback-btn negative" id="negativeFeedback">👎 Poor Response</button>
            </div>

            <div class="controls">
                <button class="control-btn" id="resetButton">Reset System</button>
                <button class="control-btn" id="statsButton">Show Stats</button>
                <button class="control-btn" id="exportButton">Export State</button>
            </div>

            <div class="stats-panel" id="statsPanel" style="display: none;">
                <h3>System Statistics</h3>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { RFSECore } from './src/index.js';

        // Initialize RFSE
        const rfse = new RFSECore({
            dimension: 64,
            fixpointConfig: {
                maxIterations: 50,
                convergenceThreshold: 0.8
            }
        });

        // DOM elements
        const conversationArea = document.getElementById('conversationArea');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const positiveFeedback = document.getElementById('positiveFeedback');
        const negativeFeedback = document.getElementById('negativeFeedback');
        const resetButton = document.getElementById('resetButton');
        const statsButton = document.getElementById('statsButton');
        const exportButton = document.getElementById('exportButton');
        const statsPanel = document.getElementById('statsPanel');
        const statsGrid = document.getElementById('statsGrid');

        let lastResponseMetadata = null;

        // Add message to conversation
        function addMessage(text, type, metadata = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            let content = `<div><strong>${type === 'user' ? 'You' : 'RFSE'}:</strong> ${text}</div>`;

            if (metadata) {
                content += `<div class="message-meta">Cluster: ${metadata.cluster} | Converged: ${metadata.converged} | Iterations: ${metadata.iterations}</div>`;
            }

            messageDiv.innerHTML = content;
            conversationArea.appendChild(messageDiv);
            conversationArea.scrollTop = conversationArea.scrollHeight;
        }

        // Process user input
        async function processInput() {
            const text = userInput.value.trim();
            if (!text) return;

            // Disable input
            userInput.disabled = true;
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span>';

            // Add user message
            addMessage(text, 'user');
            userInput.value = '';

            try {
                // Process through RFSE
                const result = await rfse.processInput(text);

                // Add RFSE response
                addMessage(result.text, 'rfse', result.metadata);
                lastResponseMetadata = result.metadata;

            } catch (error) {
                console.error('Error processing input:', error);
                addMessage('An error occurred while processing your input.', 'system');
            }

            // Re-enable input
            userInput.disabled = false;
            sendButton.disabled = false;
            sendButton.textContent = 'Send';
            userInput.focus();
        }

        // Provide feedback
        function provideFeedback(signal) {
            const result = rfse.provideFeedback(signal);
            addMessage(
                `Feedback received: ${signal > 0 ? 'Positive' : 'Negative'}. Recent success rate: ${(result.currentExplorationRate * 100).toFixed(1)}%`,
                'system'
            );
        }

        // Show statistics
        function showStatistics() {
            const stats = rfse.getStatistics();
            statsGrid.innerHTML = '';

            const displayStats = [
                { label: 'Iterations', value: stats.iteration },
                { label: 'Messages', value: stats.conversationLength },
                { label: 'Clusters', value: stats.clusters.totalClusters },
                { label: 'Memory Items', value: stats.temporal.totalStates },
                { label: 'Coherence', value: (stats.temporal.coherence.overall * 100).toFixed(0) + '%' },
                { label: 'Cognitive Load', value: (stats.temporal.cognitiveLoad * 100).toFixed(0) + '%' }
            ];

            for (const stat of displayStats) {
                const statDiv = document.createElement('div');
                statDiv.className = 'stat-item';
                statDiv.innerHTML = `
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                `;
                statsGrid.appendChild(statDiv);
            }

            statsPanel.style.display = statsPanel.style.display === 'none' ? 'block' : 'none';
        }

        // Reset system
        function resetSystem() {
            if (confirm('Are you sure you want to reset the system? All learning will be lost.')) {
                rfse.reset();
                conversationArea.innerHTML = `
                    <div class="message system">
                        <div><strong>System:</strong> RFSE reset. Starting fresh.</div>
                        <div class="message-meta">All memory cleared</div>
                    </div>
                `;
                lastResponseMetadata = null;
            }
        }

        // Export state
        function exportState() {
            const state = rfse.export();
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rfse-state-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            addMessage('System state exported successfully.', 'system');
        }

        // Event listeners
        sendButton.addEventListener('click', processInput);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processInput();
        });

        positiveFeedback.addEventListener('click', () => provideFeedback(1.0));
        negativeFeedback.addEventListener('click', () => provideFeedback(-1.0));
        resetButton.addEventListener('click', resetSystem);
        statsButton.addEventListener('click', showStatistics);
        exportButton.addEventListener('click', exportState);

        // Focus input on load
        userInput.focus();

        console.log('RFSE Conversational Interface Loaded');
        console.log('System Architecture:', {
            primitives: 'Vector, Relational, Hash, Statistical, Matrix',
            symbolic: 'Tokenizer, Phonetic, Structural, Semantic, Compiler',
            axioms: 'BaseAxioms, Generator, Composer',
            coherence: 'Convergence, FixpointEngine, ModalOperators',
            projection: 'GaloisMapper, DomainTranslator',
            decomposition: 'StatePartitioner, RecursiveOperator',
            feedback: 'PathTracker, ProbabilityMatrix, SequenceModifier',
            partition: 'BoundlessPriorPartitionGenerator',
            temporal: 'ContextWindow, MemoryConsolidator, CapacityEscalator'
        });
    </script>
</body>
</html>
