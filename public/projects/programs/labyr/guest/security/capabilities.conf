# Labyr Daemon Capability Configuration
# Capabilities to retain (all others are dropped)
#
# Format: capability_name [description]

# Essential capabilities for labyr daemon operation
cap_net_bind_service    # Bind to Unix socket (API endpoint)
cap_setgid              # Switch to guest user after initialization
cap_setuid              # Switch to guest user after initialization

# Capabilities explicitly dropped (deny by default):
# cap_sys_admin         - Administrative operations
# cap_sys_ptrace        - Process tracing/debugging
# cap_sys_module        - Kernel module loading
# cap_sys_rawio         - Raw I/O operations
# cap_sys_boot          - System reboot
# cap_sys_time          - System clock modification
# cap_sys_nice          - Process priority changes
# cap_sys_resource      - Resource limit overrides
# cap_net_admin         - Network administration
# cap_net_raw           - Raw socket access
# cap_dac_override      - DAC permission bypass
# cap_fowner            - File ownership changes
# cap_kill              - Signal delivery to arbitrary processes
# cap_mknod             - Device node creation
# cap_audit_control     - Audit system control
# cap_setfcap           - File capability setting
# cap_ipc_lock          - Memory locking
# cap_ipc_owner         - IPC ownership bypass
